name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ENABLE_TEST_AUTH: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
      LEMONSQUEEZY_STORE_ID: ${{ secrets.LEMONSQUEEZY_STORE_ID }}
      LEMONSQUEEZY_WEBHOOK_SECRET: ${{ secrets.LEMONSQUEEZY_WEBHOOK_SECRET }}
      GITHUB_REPOSITORY: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create test directories
        run: mkdir -p tests/e2e/.auth test-results playwright-report

      - name: Build Next.js app
        run: npm run build || echo "BUILD_FAILED=true" >> $GITHUB_ENV
        env:
          NODE_ENV: production

      - name: Run E2E tests
        if: env.BUILD_FAILED != 'true'
        run: npx playwright test --reporter=json,html || true
        env:
          CI: true
          PLAYWRIGHT_JSON_OUTPUT_NAME: test-results/results.json

      - name: Parse test results
        if: always()
        run: node scripts/parse-test-results.js

      - name: Upload results to database
        if: always()
        run: node scripts/upload-test-results.js
        env:
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 3

      - name: Check test status
        if: always()
        run: |
          if [ -f test-results/parsed.json ]; then
            STATUS=$(node -e "console.log(require('./test-results/parsed.json').status)")
            if [ "$STATUS" = "failed" ]; then
              echo "Tests failed!"
              exit 1
            fi
          fi
